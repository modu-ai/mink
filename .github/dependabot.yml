# Dependabot configuration for AI.GOOSE
# SPEC: governance/dependabot
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Go modules — internal/, pkg/, cmd/
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "type/chore"
      - "area/dependencies"
      - "priority/p3-low"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      go-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        # Major version bumps stay as individual PRs for review attention.

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    labels:
      - "type/chore"
      - "area/infra"
      - "priority/p3-low"
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
