// Package goose.v1은 goosed 데몬의 메타-RPC unary 3종 계약을 정의한다.
// SPEC-GOOSE-TRANSPORT-001 REQ-TR-003
syntax = "proto3";

package mink.v1;

option go_package = "github.com/modu-ai/mink/internal/transport/grpc/gen/minkv1;minkv1";

// DaemonService는 goosed 데몬 lifecycle 및 메타데이터 RPC를 제공한다.
// When a client invokes Ping, shall respond with version/uptime/state.
// When a client invokes GetInfo, shall respond with build metadata.
// When a client invokes Shutdown with valid auth, shall initiate graceful shutdown.
service DaemonService {
  // Ping은 데몬 상태를 확인하는 기본 RPC다.
  // REQ-TR-005: version, uptime_ms, state 반환
  rpc Ping(PingRequest) returns (PingResponse);

  // GetInfo는 빌드 메타데이터를 반환한다.
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);

  // Shutdown은 인증된 클라이언트로부터 graceful shutdown을 트리거한다.
  // REQ-TR-006: auth_token 헤더 필요
  // REQ-TR-010: 토큰 누락 시 Unauthenticated
  // REQ-TR-011: GOOSE_SHUTDOWN_TOKEN 미설정 시 Unimplemented
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);

  // ChatStream은 LLM과의 대화형 채팅을 위한 bidirectional streaming RPC다.
  // REQ-CLI-009: 클라이언트는 메시지를 전송하고 서버로부터 스트리밍 응답을 수신한다.
  rpc ChatStream(stream ChatStreamRequest) returns (stream ChatStreamResponse);
}

// ChatStreamRequest는 ChatStream RPC 요청 메시지다.
message ChatStreamRequest {
  // Message는 사용자 메시지나 시스템 프롬프트를 나타낸다.
  Message message = 1;
}

// ChatStreamResponse는 ChatStream RPC 응답 메시지다.
message ChatStreamResponse {
  oneof event {
    // TextEvent는 LLM 생성 텍스트 조각을 전달한다.
    TextEvent text = 1;
    // ErrorEvent는 처리 중 오류를 전달한다.
    ErrorEvent error = 2;
    // DoneEvent는 스트림 종료를 알린다.
    DoneEvent done = 3;
  }
}

// Message는 채팅 메시지를 나타낸다.
message Message {
  string role = 1;    // "user", "assistant", "system"
  string content = 2; // 메시지 내용
}

// TextEvent는 텍스트 응답 조각을 나타낸다.
message TextEvent {
  string content = 1; // 텍스트 조각
}

// ErrorEvent는 오류를 나타낸다.
message ErrorEvent {
  string message = 1; // 오류 메시지
}

// DoneEvent는 스트림 종료를 나타낸다.
message DoneEvent {}

// PingRequest는 Ping RPC 요청 메시지다.
message PingRequest {}

// PingResponse는 Ping RPC 응답 메시지다.
// state는 CORE-001 ProcessState.String() 값과 일치한다 (init|bootstrap|serving|draining|stopped).
message PingResponse {
  string version   = 1;
  int64  uptime_ms = 2;
  string state     = 3;
}

// GetInfoRequest는 GetInfo RPC 요청 메시지다.
message GetInfoRequest {}

// GetInfoResponse는 GetInfo RPC 응답 메시지다.
message GetInfoResponse {
  string version    = 1;
  string git_commit = 2;
  string go_version = 3;
  string build_time = 4;
  string os         = 5;
  string arch       = 6;
}

// ShutdownRequest는 Shutdown RPC 요청 메시지다.
message ShutdownRequest {
  // reason은 선택적 감사 추적 메시지다.
  string reason = 1;
}

// ShutdownResponse는 Shutdown RPC 응답 메시지다.
message ShutdownResponse {
  bool   accepted = 1;
  string message  = 2;
}
